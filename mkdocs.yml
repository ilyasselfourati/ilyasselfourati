site_name: Ilyass El Fourati
site_description: >-
  Portfolio d'Ilyass El Fourati — Data Scientist & AI Engineer.
  Machine Learning appliqué, GenAI (RAG, LLM), computer vision et industrialisation
  des solutions data au service de l'industrie 4.0.
site_url: https://ilyasselfourati.github.io/
site_author: Ilyass El Fourati

docs_dir: web/

repo_url: https://github.com/ilyasselfourati/ilyasselfourati
repo_name: ilyasselfourati/ilyasselfourati
edit_uri: edit/main/web/

copyright: >-
  © 2026 Ilyass El Fourati — Tous droits réservés.

theme:
  name: material
  custom_dir: overrides
  language: fr
  logo: assets/logo.png
  favicon: assets/logo.png

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow

extra_css:
  - stylesheets/tokens.css
  - stylesheets/base.css
  - stylesheets/home.css

extra:
  analytics:
    provider: google
    property: G-4GPL6MXYQ3
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ilyasselfourati/
      name: LinkedIn — Ilyass El Fourati
    - icon: fontawesome/brands/github
      link: https://github.com/ilyasselfourati
      name: GitHub — ilyasselfourati
    - icon: fontawesome/solid/paper-plane
      link: mailto:ilyasselfourati@gmail.com
      name: Email — ilyasselfourati@gmail.com

plugins:
  - search:
      lang: fr

markdown_extensions:
  - meta
  - attr_list
  - md_in_html
  - admonition
  - sane_lists
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Accueil: index.md
